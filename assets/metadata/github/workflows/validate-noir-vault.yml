name: Validate Noir Vault

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate metadata JSON files
        run: |
          echo "=== Checking all metadata files ==="
          for file in assets/metadata/*.json; do
            echo "Checking $file"
            python3 -m json.tool "$file" > /dev/null && echo "✅ Valid" || echo "❌ Invalid JSON in $file"
          done

      - name: List all NFTs in vault
        run: |
          echo "=== Current NFTs in Vault ==="
          ls -1 assets/metadata/*.json | sed 's|assets/metadata/||' | sed 's|.json||'
          echo "Total NFTs: $(ls assets/metadata/*.json | wc -l)"

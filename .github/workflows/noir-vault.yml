name: Noir Vault CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate metadata files
      run: |
        echo "Checking JSON metadata files..."
        ls assets/metadata/*.json || echo "No metadata files yet"
        echo "Vault check complete."

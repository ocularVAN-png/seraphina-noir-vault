name: Weekly Vault Summary

on:
  schedule:
    - cron: '0 10 * * 1'   # Every Monday at 10:00 UTC
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate summary
        run: |
          echo "## Weekly Noir Vault Summary" > summary.md
          echo "" >> summary.md
          echo "**Date**: $(date)" >> summary.md
          echo "" >> summary.md
          echo "### Current NFTs" >> summary.md
          ls assets/metadata/*.json | xargs -n 1 basename >> summary.md
          echo "" >> summary.md
          echo "Total pieces: $(ls assets/metadata/*.json | wc -l)" >> summary.md
